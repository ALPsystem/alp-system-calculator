<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALP System Calculator</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f8f9fa; color: #333; padding: 20px; }
        .calculator-container { max-width: 600px; margin: 0 auto; background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; font-size: 1.5em; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; font-size: 0.9em; color: #4a5568; }
        input[type="number"] { width: 100%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 5px; box-sizing: border-box; font-size: 1em; }
        .checkbox-group { display: flex; align-items: flex-start; margin-bottom: 15px; }
        .checkbox-group input { margin-top: 4px; margin-right: 10px; transform: scale(1.2); }
        .checkbox-group label { font-weight: normal; font-size: 0.95em; cursor: pointer; }
        hr { border: 0; height: 1px; background: #e2e8f0; margin: 25px 0; }
        .results-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .metric-box { background: #edf2f7; padding: 15px; border-radius: 8px; text-align: center; }
        .metric-value { font-size: 1.5em; font-weight: bold; color: #2b6cb0; margin-top: 5px; }
        .metric-label { font-size: 0.8em; color: #4a5568; text-transform: uppercase; letter-spacing: 0.5px; }
        .phenotype-result { background: #ebf8fa; border-left: 5px solid #3182ce; padding: 20px; border-radius: 0 8px 8px 0; }
        .phenotype-title { font-size: 1.2em; font-weight: bold; color: #2c3e50; margin-bottom: 5px; }
        .indication { font-size: 1em; color: #e53e3e; font-weight: 600; }
    </style>
</head>
<body>

<div class="calculator-container">
    <h2>ALP System Sagittal Phenotyping</h2>
    
    <div class="input-group">
        <label>Index Knee PTS (°)</label>
        <input type="number" id="ptsIndex" value="12" step="0.1" oninput="calculateALP()">
    </div>
    <div class="input-group">
        <label>Contralateral Knee PTS (°)</label>
        <input type="number" id="ptsContra" value="10" step="0.1" oninput="calculateALP()">
    </div>
    <div class="input-group">
        <label>Index Knee sATT (%)</label>
        <input type="number" id="sattIndex" value="25" step="0.1" oninput="calculateALP()">
    </div>
    <div class="input-group">
        <label>Contralateral Knee sATT (%)</label>
        <input type="number" id="sattContra" value="15" step="0.1" oninput="calculateALP()">
    </div>

    <div class="checkbox-group">
        <input type="checkbox" id="isChronic" onchange="calculateALP()">
        <label for="isChronic"><b>Chronic Injury</b> (>12 months) OR <b>Meniscal Deficiency</b></label>
    </div>
    <div class="checkbox-group">
        <input type="checkbox" id="isLaxity" onchange="calculateALP()">
        <label for="isLaxity"><b>Inherent Hyperlaxity</b> / High Bilateral Baseline sATT</label>
    </div>

    <hr>

    <div class="results-grid">
        <div class="metric-box">
            <div class="metric-label">Raw ΔsATT</div>
            <div class="metric-value" id="valRawSatt">0.0%</div>
        </div>
        <div class="metric-box">
            <div class="metric-label">ΔPTS</div>
            <div class="metric-value" id="valDeltaPts">0.0°</div>
        </div>
        <div class="metric-box" style="background:#e6fffa; border: 1px solid #38b2ac;">
            <div class="metric-label">Adjusted ΔsATT</div>
            <div class="metric-value" id="valAdjSatt" style="color:#2c7a7b;">0.0%</div>
        </div>
    </div>

    <div class="phenotype-result">
        <div class="phenotype-title" id="resultPhenotype">Awaiting inputs...</div>
        <div class="indication" id="resultIndication"></div>
    </div>
</div>

<script>
    function calculateALP() {
        const ptsI = parseFloat(document.getElementById('ptsIndex').value) || 0;
        const ptsC = parseFloat(document.getElementById('ptsContra').value) || 0;
        const sattI = parseFloat(document.getElementById('sattIndex').value) || 0;
        const sattC = parseFloat(document.getElementById('sattContra').value) || 0;
        const chronic = document.getElementById('isChronic').checked;
        const laxity = document.getElementById('isLaxity').checked;

        // Metrics
        const rawDeltaSatt = sattI - sattC;
        const deltaPts = ptsI - ptsC;
        const adjDeltaSatt = rawDeltaSatt - (deltaPts * 1.2);

        document.getElementById('valRawSatt').innerText = rawDeltaSatt.toFixed(1) + '%';
        document.getElementById('valDeltaPts').innerText = deltaPts.toFixed(1) + '°';
        document.getElementById('valAdjSatt').innerText = adjDeltaSatt.toFixed(1) + '%';

        // Logic
        const steepBone = ptsI >= 12;
        const pathologicalShift = adjDeltaSatt >= 7;
        const benignShift = adjDeltaSatt <= 3;

        let phenotype = "Unclassified / Transition Zone";
        let indication = "Clinical correlation required.";

        if (steepBone && pathologicalShift && chronic && laxity) {
            phenotype = "The Triple Hit (Catastrophic)";
            indication = "Indication: Critical";
        } else if (steepBone && pathologicalShift && chronic && !laxity) {
            phenotype = "Double Hit A (Synergistic Failure)";
            indication = "Indication: High";
        } else if (steepBone && pathologicalShift && !chronic && laxity) {
            phenotype = "Double Hit C (Compounded Risk)";
            indication = "Indication: Moderate to High";
        } else if (!steepBone && pathologicalShift && !chronic && laxity) {
            phenotype = "Double Hit B (Acute-on-Baseline)";
            indication = "Indication: Moderate";
        } else if (steepBone && pathologicalShift && !chronic && !laxity) {
            phenotype = "Type 1: Osseous (PTS-Driven)";
            indication = "Indication: Moderate to High";
        } else if (!steepBone && pathologicalShift && chronic && !laxity) {
            phenotype = "Type 2: Acquired Soft-Tissue";
            indication = "Indication: Moderate to High";
        } else if (laxity && benignShift) {
            phenotype = "Type 3: Inherent Soft-Tissue (Hyperlaxity)";
            indication = "Indication: Low / Contraindicated";
        }

        document.getElementById('resultPhenotype').innerText = phenotype;
        document.getElementById('resultIndication').innerText = indication;
    }

    // Initialize on load
    calculateALP();
</script>

</body>
</html>
